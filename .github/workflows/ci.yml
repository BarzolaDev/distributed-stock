          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r order-service/requirements.txt
      - run: pip install safety
      - run: safety check -r order-service/requirements.txt
      - run: pytest order-service/
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orders
