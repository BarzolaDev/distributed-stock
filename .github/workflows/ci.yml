name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  inventory:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r inventory-service/requirements.txt
      - run: pip install safety
      - run: safety check -r inventory-service/requirements.txt
      - run: pytest inventory-service/
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

  payment:
